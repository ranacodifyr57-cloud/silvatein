  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

s: \"Archivo\", ui-sans-serif, system-ui, -apple-system, sans-serif;\n\n  --gut: clamp(1.25rem, 4vw, 4rem);\n  --maxw: 1440px;\n}\n\n* { box-sizing: border-box; }\n\nhtml { scroll-behavior: smooth; }\n\nbody {\n  margin: 0;\n  background-color: var(--noir);\n  color: var(--ivory);\n  font-family: var(--font-sans);\n  font-weight: 400;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  overflow-x: hidden;\n  line-height: 1.5;\n}\n\n::selection { background-color: var(--ivory); color: var(--noir); }\n\nimg { display: block; max-width: 100%; }\na { color: inherit; text-decoration: none; }\n\n/* soft paper grain over everything */\nbody::before {\n  content: \"\";\n  position: fixed;\n  inset: 0;\n  z-index: 90;\n  pointer-events: none;\n  opacity: 0.045;\n  background-image: url(\"data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E\");\n}\n\n/* ── Layout ──────────────────────────────────────────────── */\n.container-x {\n  width: 100%;\n  max-width: var(--maxw);\n  margin-inline: auto;\n  padding-inline: var(--gut);\n}\n\n.section { padding-block: clamp(4.5rem, 9vw, 8rem); }\n.bg-ink { background-color: var(--ink); }\n.bg-deep { background-color: var(--noir-deep); }\n.divide-y { border-block: 1px solid var(--line-soft); }\n\n/* ── Type ────────────────────────────────────────────────── */\n.display {\n  font-family: var(--font-display);\n  font-weight: 600;\n  line-height: 1.0;\n  letter-spacing: -0.005em;\n}\n.italic { font-style: italic; }\n\n.label {\n  font-family: var(--font-sans);\n  font-size: 0.68rem;\n  font-weight: 400;\n  text-transform: uppercase;\n  letter-spacing: 0.26em;\n  color: var(--clay);\n}\n.label-line {\n  display: inline-flex;\n  align-items: center;\n  gap: 0.85rem;\n}\n.label-line::before {\n  content: \"\";\n  width: 2.5rem;\n  height: 1px;\n  background: var(--clay);\n}\n\n.eyebrow {\n  font-family: var(--font-sans);\n  font-size: 0.66rem;\n  font-weight: 400;\n  text-transform: uppercase;\n  letter-spacing: 0.24em;\n  color: rgba(244, 236, 224, 0.45);\n}\n\n.lead {\n  font-size: clamp(1rem, 1.3vw, 1.1rem);\n  line-height: 1.7;\n  color: rgba(244, 236, 224, 0.72);\n  font-weight: 400;\n}\n\n.text-clay { color: var(--clay); }\n.text-gold { color: var(--gold); }\n.text-sage { color: var(--sage-glow); }\n.text-dim { color: rgba(244, 236, 224, 0.6); }\n\n/* ── Buttons ─────────────────────────────────────────────── */\n.btn {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: 0.6rem;\n  min-height: 50px;\n  padding-inline: 1.9rem;\n  font-family: var(--font-sans);\n  font-size: 0.7rem;\n  font-weight: 400;\n  text-transform: uppercase;\n  letter-spacing: 0.2em;\n  cursor: pointer;\n  border: 1px solid transparent;\n  transition: background-color .3s ease, color .3s ease, border-color .3s ease;\n}\n.btn-festive { background: var(--rust); color: var(--ivory); }\n.btn-festive:hover { background: #97431f; }\n.btn-solid { background: var(--ivory); color: var(--noir); }\n.btn-solid:hover { background: var(--gold); }\n.btn-outline { border-color: rgba(244, 236, 224, 0.32); color: var(--ivory); }\n.btn-outline:hover { background: var(--ivory); color: var(--noir); border-color: var(--ivory); }\n\n/* ── Links ───────────────────────────────────────────────── */\n.link-underline { position: relative; }\n.link-underline::after {\n  content: \"\";\n  position: absolute;\n  left: 0;\n  bottom: -3px;\n  height: 1px;\n  width: 0;\n  background: currentColor;\n  transition: width .35s cubic-bezier(.16,1,.3,1);\n}\n.link-underline:hover::after { width: 100%; }\n\n/* ── Image frame, badge, caption ─────────────────────────── */\n.frame {\n  position: relative;\n  overflow: hidden;\n  border: 1px solid var(--line);\n  background: var(--ink-2);\n}\n.frame img { width: 100%; height: 100%; object-fit: cover; }\n.ar-45 { aspect-ratio: 4 / 5; }\n.ar-34 { aspect-ratio: 3 / 4; }\n.ar-11 { aspect-ratio: 1 / 1; }\n.ar-169 { aspect-ratio: 16 / 9; }\n\n.badge {\n  position: absolute;\n  left: 1rem; top: 1rem;\n  z-index: 5;\n  background: rgba(22, 19, 16, 0.78);\n  backdrop-filter: blur(6px);\n  padding: 0.34rem 0.7rem;\n  font-size: 0.58rem;\n  text-transform: uppercase;\n  letter-spacing: 0.18em;\n  color: var(--ivory);\n}\n.caption {\n  position: absolute;\n  left: 1.1rem; bottom: 1rem;\n  z-index: 5;\n  font-family: var(--font-display);\n  font-style: italic;\n  font-size: 1.25rem;\n  color: rgba(244, 236, 224, 0.96);\n  text-shadow: 0 1px 12px rgba(0,0,0,.55);\n  pointer-events: none;\n}\n\n/* subtle film over photos so they sit in the dark world */\n.frame::after {\n  content: \"\";\n  position: absolute;\n  inset: 0;\n  background: linear-gradient(180deg, rgba(28,24,19,0) 45%, rgba(22,19,16,.45) 100%);\n  pointer-events: none;\n}\n\n/* ── Botanical sprig motif ───────────────────────────────── */\n.sprig {\n  position: absolute;\n  pointer-events: none;\n  color: rgba(244, 236, 224, 0.13);\n}\n\n/* ── Navbar ──────────────────────────────────────────────── */\n.announce {\n  background: var(--ink);\n  color: rgba(244, 236, 224, 0.7);\n}\n.announce .row {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  gap: 0.85rem;\n  padding-block: 0.55rem;\n  font-size: 0.6rem;\n  text-transform: uppercase;\n  letter-spacing: 0.22em;\n}\n.announce .sep { width: 1px; height: 0.8rem; background: rgba(244,236,224,.2); }\n\nheader.site {\n  position: sticky;\n  top: 0;\n  z-index: 50;\n  border-bottom: 1px solid transparent;\n  transition: background-color .5s ease, border-color .5s ease, backdrop-filter .5s ease;\n}\nheader.site.scrolled {\n  background: rgba(28, 24, 19, 0.88);\n  backdrop-filter: blur(12px);\n  border-bottom-color: var(--line);\n}\nheader.site nav {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  padding-block: 1.05rem;\n}\n.brand { display: inline-flex; align-items: center; gap: 0.8rem; transition: opacity .3s; }\n.brand:hover { opacity: 0.72; }\n.brand .name {\n  font-family: var(--font-sans);\n  font-size: 0.95rem;\n  font-weight: 500;\n  text-transform: uppercase;\n  letter-spacing: 0.34em;\n  padding-left: 0.1em;\n}\n.navlinks { display: flex; align-items: center; gap: 2.3rem; list-style: none; margin: 0; padding: 0; }\n.navlinks a {\n  font-size: 0.7rem;\n  text-transform: uppercase;\n  letter-spacing: 0.2em;\n  color: rgba(244, 236, 224, 0.85);\n}\n.navlinks a:hover, .navlinks a.active { color: var(--ivory); }\n\n.burger {\n  display: none;\n  flex-direction: column;\n  width: 46px; height: 46px;\n  align-items: center; justify-content: center;\n  background: none; border: none; cursor: pointer;\n  -webkit-tap-highlight-color: transparent;\n}\n.burger:focus { outline: none; }\n.burger:focus-visible { outline: 2px solid var(--ivory); outline-offset: 2px; }\n.burger span { display: block; height: 1px; width: 24px; background: var(--ivory); transition: transform .3s, opacity .3s; }\n.burger span + span { margin-top: 5px; }\n.burger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }\n.burger.open span:nth-child(2) { opacity: 0; }\n.burger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }\n\n.mobile-menu {\n  overflow: hidden;\n  max-height: 0;\n  border-top: 1px solid transparent;\n  background: var(--noir);\n  transition: max-height .5s ease, border-color .5s ease;\n}\n.mobile-menu.open { max-height: 26rem; border-top-color: var(--line-soft); }\n.mobile-menu ul { list-style: none; margin: 0; padding: 1rem 0 1.5rem; display: flex; flex-direction: column; gap: 0.25rem; }\n.mobile-menu a { display: block; padding-block: 0.7rem; font-family: var(--font-display); font-size: 1.7rem; }\n\n/* ── Marquee ─────────────────────────────────────────────── */\n.marquee {\n  overflow: hidden;\n  border-block: 1px solid var(--line);\n  background: var(--ink);\n  color: rgba(244, 236, 224, 0.82);\n  padding-block: 1rem;\n}\n.marquee .track { display: flex; width: max-content; animation: marquee 34s linear infinite; }\n.marquee .grp { display: flex; flex-shrink: 0; align-items: center; }\n.marquee .item { display: flex; align-items: center; }\n.marquee .item > span {\n  white-space: nowrap;\n  padding-inline: 1.5rem;\n  font-family: var(--font-display);\n  font-style: italic;\n  font-size: 1.5rem;\n}\n@keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }\n\n/* ── Reveal on scroll ────────────────────────────────────── */\n.reveal {\n  opacity: 0;\n  transform: translateY(26px);\n  transition: opacity .9s cubic-bezier(.16,1,.3,1), transform .9s cubic-bezier(.16,1,.3,1);\n}\n.reveal.is-visible { opacity: 1; transform: translateY(0); }\n@media (prefers-reduced-motion: reduce) {\n  .reveal { opacity: 1; transform: none; transition: none; }\n  .marquee .track { animation: none; }\n}\n\n/* ── Footer ──────────────────────────────────────────────── */\nfooter.site { border-top: 1px solid var(--line-soft); background: var(--ink); }\nfooter.site a:hover { color: var(--ivory); }\n\n/* ── Utility grid helpers used inline-lite ───────────────── */\n.grid { display: grid; gap: 1.25rem; }\n.flex { display: flex; }\n.wrap { flex-wrap: wrap; }\n.gap-sm { gap: 0.75rem; }\n.gap-md { gap: 1.25rem; }\n.hide-sm { display: inline-flex; }\n\n/* ── Hero (Atelier editorial) ────────────────────────────── */\n.hero-ed { position: relative; overflow: hidden; padding-top: 1rem; }\n.hero-ed-vlabel {\n  position: absolute;\n  left: 1.5rem;\n  top: 46%;\n  transform: rotate(-90deg);\n  transform-origin: left center;\n  font-size: 0.62rem;\n  letter-spacing: 0.32em;\n  text-transform: uppercase;\n  color: var(--clay);\n  white-space: nowrap;\n  display: none;\n}\n.hero-ed-grid {\n  display: grid;\n  gap: clamp(2rem, 5vw, 4rem);\n  align-items: start;\n  padding-block: clamp(2rem, 5vw, 4rem) clamp(4rem, 8vw, 7rem);\n}\n.hero-ed-title {\n  font-size: clamp(4rem, 13vw, 9rem);\n  font-weight: 600;\n  line-height: 0.88;\n  letter-spacing: -0.02em;\n  margin: 0;\n}\n.hero-ed-lead {\n  max-width: 26rem;\n  margin-top: 2rem;\n  font-size: 1rem;\n  line-height: 1.7;\n  color: rgba(244, 236, 224, 0.7);\n}\n.hero-ed-marks {\n  display: flex;\n  flex-wrap: wrap;\n  gap: 0.5rem 1.75rem;\n  margin-top: 2rem;\n  font-size: 0.66rem;\n  text-transform: uppercase;\n  letter-spacing: 0.18em;\n  color: rgba(244, 236, 224, 0.5);\n}\n.hero-ed-media { position: relative; width: 100%; max-width: 26rem; margin: 0 auto clamp(2rem, 4vw, 0); }\n.hero-ed-main { aspect-ratio: 3 / 4; }\n.hero-ed-main img { width: 100%; height: 100%; object-fit: cover; }\n.hero-ed-sub {\n  position: absolute;\n  left: -1.25rem;\n  bottom: -2rem;\n  width: 46%;\n  aspect-ratio: 4 / 5;\n  border: 6px solid var(--noir);\n  box-shadow: 0 24px 50px rgba(0,0,0,.5);\n  margin: 0;\n  max-width: none;\n}\n.hero-ed-sub img { width: 100%; height: 100%; object-fit: cover; }\n.hero-ed-cap {\n  position: absolute;\n  right: 0.25rem;\n  bottom: -2.6rem;\n  font-size: 1.15rem;\n  color: rgba(244, 236, 224, 0.92);\n}\n@media (min-width: 1024px) {\n  .hero-ed-vlabel { display: block; }\n  .hero-ed-grid { grid-template-columns: 1.05fr 0.95fr; align-items: center; }\n  .hero-ed-media { margin: 0 0 0 auto; }\n}\n\n/* ── Collections — editorial index ───────────────────────── */\n.idx-head {\n  display: flex;\n  align-items: flex-end;\n  justify-content: space-between;\n  padding-bottom: 1.5rem;\n}\n.idx-title { font-size: clamp(2rem, 4vw, 3rem); margin: 0; }\n.idx-row {\n  display: grid;\n  grid-template-columns: 3rem 1fr;\n  grid-template-areas: \"no name\" \"no desc\";\n  align-items: center;\n  gap: 0.35rem 1.25rem;\n  padding-block: 1.75rem;\n  border-top: 1px solid var(--line);\n  transition: padding-left .35s cubic-bezier(.16,1,.3,1);\n}\n.idx-row:hover { padding-left: 0.75rem; }\n.idx-last { border-bottom: 1px solid var(--line); }\n.idx-no { grid-area: no; font-size: 1.6rem; align-self: start; }\n.idx-name { grid-area: name; font-size: clamp(2.4rem, 6vw, 3.6rem); line-height: 1; }\n.idx-desc { grid-area: desc; font-size: 0.9rem; line-height: 1.55; max-width: 34rem; }\n.idx-thumb { display: none; }\n.idx-arrow { display: none; font-size: 1.3rem; transition: transform .3s; }\n.idx-row:hover .idx-arrow { transform: translateX(6px); }\n@media (min-width: 900px) {\n  .idx-row {\n    grid-template-columns: 4rem 1fr 24rem 9rem 2rem;\n    grid-template-areas: \"no name desc thumb arrow\";\n    gap: 2.5rem;\n  }\n  .idx-no { align-self: center; }\n  .idx-desc { align-self: center; }\n  .idx-thumb {\n    grid-area: thumb;\n    display: block;\n    justify-self: end;\n    width: 0;\n    height: 6rem;\n    overflow: hidden;\n    transition: width .4s cubic-bezier(.16,1,.3,1);\n  }\n  .idx-row:hover .idx-thumb { width: 9rem; }\n  .idx-thumb img { width: 9rem; height: 6rem; object-fit: cover; }\n  .idx-arrow { grid-area: arrow; display: block; justify-self: end; }\n}\n\n/* ── Hero ────────────────────────────────────────────────── */\n.hero { position: relative; overflow: hidden; }\n.hero-grid {\n  position: relative;\n  z-index: 1;\n  display: grid;\n  align-items: center;\n  gap: clamp(2.5rem, 5vw, 4rem);\n  padding-block: clamp(2.5rem, 6vw, 5rem) clamp(4rem, 8vw, 7rem);\n}\n.hero-title {\n  margin: 1.4rem 0 0;\n  font-size: clamp(2.8rem, 7.5vw, 5rem);\n  font-weight: 600;\n}\n.hero-sub { max-width: 30rem; margin-top: 1.75rem; }\n.hero-cta { margin-top: 2.25rem; }\n.hero-marks {\n  display: flex;\n  flex-wrap: wrap;\n  align-items: center;\n  gap: 0.5rem 1.5rem;\n  margin-top: 2.5rem;\n  font-size: 0.7rem;\n  text-transform: uppercase;\n  letter-spacing: 0.16em;\n  color: rgba(244, 236, 224, 0.55);\n}\n.hero-marks .dot { width: 1px; height: 0.8rem; background: rgba(244,236,224,.25); }\n\n.hero-media { position: relative; widt
